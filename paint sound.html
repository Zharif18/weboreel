<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SONICA — Paint with Sound</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,500;1,300&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: #0c0c0f;
  --ui: #f0ece0;
  --ui-dim: rgba(240,236,224,0.85);
  --ui-faint: rgba(240,236,224,0.22);
  --accent: #ff4d1c;
}

html, body {
  width:100%; height:100%;
  background: var(--bg);
  overflow: hidden;
  font-family: 'DM Mono', monospace;
  color: var(--ui);
  touch-action: none;
}

#c {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  cursor: crosshair;
}

#grain {
  position: fixed; inset: 0;
  opacity: .04;
  pointer-events: none; z-index: 5;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
}

#topbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: 52px;
  display: flex; align-items: center;
  padding: 0 1.5rem;
  gap: 1.5rem;
  z-index: 20;
  background: rgba(12,12,15,0.98);
  border-bottom: 1px solid rgba(240,236,224,0.15);
}

#logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  letter-spacing: .12em;
  color: var(--ui);
  line-height: 1;
  flex-shrink: 0;
}
#logo span { color: var(--accent); }

.sep { width: 1px; height: 24px; background: var(--ui-faint); flex-shrink:0; }

#mode-label {
  font-size: .65rem;
  letter-spacing: .25em;
  text-transform: uppercase;
  color: var(--ui);
  opacity: 0.75;
  flex-shrink: 0;
}

#brushes { display: flex; gap: .5rem; align-items: center; }
.swatch {
  width: 28px; height: 28px; border-radius: 50%;
  cursor: pointer; border: 2px solid transparent;
  transition: transform .15s, border-color .15s;
  flex-shrink: 0;
}
.swatch:hover { transform: scale(1.18); }
.swatch.active { border-color: var(--ui); }

#controls { margin-left: auto; display: flex; gap: .6rem; align-items: center; }
.ctrl-btn {
  font-family: 'DM Mono', monospace;
  font-size: .62rem;
  letter-spacing: .2em;
  padding: .38rem .85rem;
  border: 1px solid rgba(240,236,224,0.3);
  background: rgba(240,236,224,0.07);
  color: var(--ui);
  cursor: pointer;
  transition: all .2s;
  text-transform: uppercase;
  white-space: nowrap;
  font-weight: 500;
}
.ctrl-btn:hover { border-color: var(--ui); color: var(--ui); background: rgba(240,236,224,0.15); }
.ctrl-btn.danger:hover { border-color: var(--accent); color: var(--accent); }

#bottombar {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 48px;
  display: flex; align-items: center;
  padding: 0 1.5rem;
  gap: 1.5rem;
  z-index: 20;
  background: rgba(12,12,15,0.98);
  border-top: 1px solid rgba(240,236,224,0.15);
}

#note-display {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  letter-spacing: .1em;
  color: var(--accent);
  min-width: 90px;
  transition: color .1s;
}

#stroke-count { font-size: .65rem; letter-spacing: .2em; color: var(--ui); opacity: 0.75; }

#size-wrap { display: flex; align-items: center; gap: .6rem; margin-left: auto; }
#size-label { font-size: .65rem; letter-spacing: .2em; color: var(--ui); opacity: 0.8; font-weight: 500; }
#size-slider {
  appearance: none;
  -webkit-appearance: none;
  width: 80px; height: 2px;
  background: var(--ui-faint); outline: none; border: none;
  cursor: pointer;
}
#size-slider::-webkit-slider-thumb {
  appearance: none;
  -webkit-appearance: none;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--ui);
  cursor: pointer;
}

/* VOLUME SLIDER */
#vol-wrap { display: flex; align-items: center; gap: .6rem; }
#vol-label { font-size: .65rem; letter-spacing: .2em; color: var(--ui); opacity: 0.8; font-weight: 500; }
#vol-slider {
  appearance: none;
  -webkit-appearance: none;
  width: 60px; height: 2px;
  background: var(--ui-faint); outline: none; border: none;
  cursor: pointer;
}
#vol-slider::-webkit-slider-thumb {
  appearance: none;
  -webkit-appearance: none;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
}

#intro {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 100;
  padding: 2rem;
  transition: opacity .8s ease, transform .8s ease;
}
#intro.gone { opacity: 0; pointer-events: none; transform: scale(1.03); }

#intro h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(4rem, 16vw, 10rem);
  letter-spacing: .08em;
  line-height: .9;
  text-align: center;
  color: var(--ui);
}
#intro h1 em { color: var(--accent); font-style: normal; }

#intro p {
  font-size: clamp(.75rem, 2vw, .9rem);
  letter-spacing: .25em;
  color: var(--ui-dim);
  text-align: center;
  margin: 1.8rem 0 2.5rem;
  line-height: 2;
  max-width: 500px;
  text-transform: uppercase;
}

.start-btn {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  letter-spacing: .3em;
  padding: .8rem 3rem;
  border: 1px solid var(--ui);
  background: transparent;
  color: var(--ui);
  cursor: pointer;
  position: relative; overflow: hidden;
  transition: color .3s;
}
.start-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: var(--accent);
  transform: translateX(-101%);
  transition: transform .35s cubic-bezier(.77,0,.18,1);
  z-index: -1;
}
.start-btn:hover::before { transform: translateX(0); }
.start-btn:hover { border-color: var(--accent); }

#save-flash {
  position: fixed; top: 70px; right: 1.5rem;
  font-size: .6rem; letter-spacing: .25em;
  color: var(--accent); z-index: 50;
  opacity: 0; transition: opacity .3s;
  pointer-events: none;
  text-transform: uppercase;
}
#save-flash.show { opacity: 1; }

#active-mode {
  font-size: .65rem; letter-spacing: .2em;
  color: var(--accent);
  text-transform: uppercase;
  font-weight: 500;
}

/* Audio indicator pulse */
#audio-indicator {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent);
  opacity: 0;
  transition: opacity .1s;
  flex-shrink: 0;
}
#audio-indicator.active { opacity: 1; animation: audioPulse .3s ease; }
@keyframes audioPulse { 0%{transform:scale(1.5)} 100%{transform:scale(1)} }

::-webkit-scrollbar { display: none; }

@media (max-width: 500px) {
  #mode-label, .sep, #stroke-count { display: none; }
  #size-wrap { display: none; }
  #vol-wrap { display: none; }
}
</style>
</head>
<body>

<div id="grain"></div>
<canvas id="c"></canvas>
<div id="save-flash">SAVED TO DISK</div>

<!-- TOP BAR -->
<div id="topbar">
  <div id="logo">SON<span>ICA</span></div>
  <div class="sep"></div>
  <div id="mode-label">PAINT WITH SOUND</div>
  <div class="sep"></div>

  <div id="brushes">
    <div class="swatch active" data-color="fire"   style="background:radial-gradient(circle at 35% 35%,#ff8c42,#ff2d00)" title="Fire — Major"></div>
    <div class="swatch"        data-color="ice"    style="background:radial-gradient(circle at 35% 35%,#a8edff,#3a7bd5)" title="Ice — Minor"></div>
    <div class="swatch"        data-color="neon"   style="background:radial-gradient(circle at 35% 35%,#39ff14,#00bb00)" title="Neon — Pentatonic"></div>
    <div class="swatch"        data-color="plasma" style="background:radial-gradient(circle at 35% 35%,#da70d6,#7b2ff7)" title="Plasma — Blues"></div>
    <div class="swatch"        data-color="gold"   style="background:radial-gradient(circle at 35% 35%,#ffd700,#b8860b)" title="Gold — Chromatic"></div>
    <div class="swatch"        data-color="void"   style="background:radial-gradient(circle at 35% 35%,#888,#111)" title="Void — Eraser + Bass"></div>
  </div>

  <div id="controls">
    <div id="audio-indicator"></div>
    <span id="active-mode">ECHO</span>
    <div class="sep"></div>
    <button class="ctrl-btn" onclick="toggleMode()">MODE: <span id="mode-txt">ECHO</span></button>
    <button class="ctrl-btn" onclick="saveCanvas()">SAVE</button>
    <button class="ctrl-btn danger" onclick="clearCanvas()">CLEAR</button>
  </div>
</div>

<!-- BOTTOM BAR -->
<div id="bottombar">
  <div id="note-display">—</div>
  <div class="sep"></div>
  <div id="stroke-count">0 STROKES</div>
  <div id="vol-wrap">
    <span id="vol-label">VOL</span>
    <input type="range" id="vol-slider" min="0" max="100" value="75">
  </div>
  <div id="size-wrap">
    <span id="size-label">SIZE</span>
    <input type="range" id="size-slider" min="2" max="60" value="18">
  </div>
</div>

<!-- INTRO -->
<div id="intro">
  <h1>PAINT<br><em>SOUND</em></h1>
  <p>Every brushstroke is a note.<br>Every color is a scale.<br>Every gesture is a melody.</p>
  <button class="start-btn" onclick="dismissIntro()">START CREATING</button>
</div>

<script>
// ══════════════════════════════════════════════════
//  SONICA — Paint with Sound  (Fixed + Louder)
// ══════════════════════════════════════════════════

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  ctx.fillStyle = '#0c0c0f';
  ctx.fillRect(0,0,W,H);
}
resize();
window.addEventListener('resize', resize);

// ── AUDIO ENGINE ──────────────────────────────────
let ac = null;
let masterGain = null;
let reverbNode = null;
let reverbGain = null;
let audioReady = false;
let userVolume = 0.75; // default volume

// Volume slider
document.getElementById('vol-slider').addEventListener('input', function() {
  userVolume = parseInt(this.value) / 100;
  if (masterGain) masterGain.gain.setTargetAtTime(userVolume, ac.currentTime, 0.01);
});

function initAudio() {
  if (audioReady) return;
  try {
    ac = new (window.AudioContext || window.webkitAudioContext)();

    // Master gain — controls overall volume
    masterGain = ac.createGain();
    masterGain.gain.value = userVolume;
    masterGain.connect(ac.destination);

    // Build reverb
    buildReverb();

    // Unlock on iOS — play silent buffer
    const buf = ac.createBuffer(1, 1, 22050);
    const src = ac.createBufferSource();
    src.buffer = buf;
    src.connect(ac.destination);
    src.start(0);

    if (ac.state === 'suspended') {
      ac.resume().then(() => { audioReady = true; });
    } else {
      audioReady = true;
    }
  } catch(e) {
    console.warn('Audio init failed:', e);
  }
}

function buildReverb() {
  try {
    const len = ac.sampleRate * 2.0;
    const buf = ac.createBuffer(2, len, ac.sampleRate);
    for (let ch = 0; ch < 2; ch++) {
      const data = buf.getChannelData(ch);
      for (let i = 0; i < len; i++) {
        data[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 2.2);
      }
    }
    reverbNode = ac.createConvolver();
    reverbNode.buffer = buf;
    reverbGain = ac.createGain();
    reverbGain.gain.value = 0.22; // reverb send level
    reverbNode.connect(reverbGain);
    reverbGain.connect(masterGain); // reverb → master
  } catch(e) {
    console.warn('Reverb build failed:', e);
  }
}

// SCALES
const SCALES = {
  fire:   [261.63,293.66,329.63,349.23,392,440,493.88,523.25,587.33,659.25,698.46,783.99],
  ice:    [261.63,293.66,311.13,349.23,392,415.30,466.16,523.25,587.33,622.25],
  neon:   [261.63,293.66,329.63,392,440,523.25,587.33,659.25,783.99,880],
  plasma: [261.63,293.66,311.13,369.99,392,415.30,466.16,523.25],
  gold:   [261.63,277.18,293.66,311.13,329.63,349.23,369.99,392,415.30,440,466.16,493.88],
  void:   [55,65.41,73.42,82.41,87.31,98,110,130.81]  // deep bass — sub-octave notes
};

const WAVEFORMS = { fire:'sawtooth', ice:'sine', neon:'square', plasma:'triangle', gold:'sine', void:'triangle' };

const COLOR_PALETTES = {
  fire:   (t) => `hsla(${20 + t*40},100%,${50+t*20}%,`,
  ice:    (t) => `hsla(${190 + t*30},80%,${60+t*20}%,`,
  neon:   (t) => `hsla(${110 + t*60},100%,${50+t*20}%,`,
  plasma: (t) => `hsla(${270 + t*60},85%,${55+t*20}%,`,
  gold:   (t) => `hsla(${40 + t*20},90%,${55+t*20}%,`,
  void:   (t) => `hsla(0,0%,${85 + t*15}%,`   // bright white/silver — visible on dark canvas
};

const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

function freqToNoteName(freq) {
  const midi = Math.round(12 * Math.log2(freq / 440) + 69);
  return NOTE_NAMES[((midi % 12) + 12) % 12] + Math.floor(midi / 12 - 1);
}

function playNote(freq, wave, vol=0.35, dur=0.5) {
  if (!audioReady || !ac || !masterGain) return;
  if (freq <= 0) return;
  if (ac.state === 'suspended') ac.resume();

  try {
    const osc   = ac.createOscillator();
    const gain  = ac.createGain();
    const filt  = ac.createBiquadFilter();
    const t     = ac.currentTime;

    osc.type = wave;
    osc.frequency.setValueAtTime(freq, t);

    // Warm lowpass filter
    filt.type = 'lowpass';
    filt.frequency.setValueAtTime(Math.min(4000, 1200 + freq * 1.5), t);
    filt.Q.value = 1.2;

    // Envelope: attack → sustain → release
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(vol, t + 0.015);   // fast attack
    gain.gain.setValueAtTime(vol * 0.85, t + 0.08);       // slight decay
    gain.gain.exponentialRampToValueAtTime(0.001, t + dur); // release

    osc.connect(filt);
    filt.connect(gain);
    gain.connect(masterGain);  // dry signal → master

    // Send to reverb if available
    if (reverbNode && reverbGain) {
      const reverbSend = ac.createGain();
      reverbSend.gain.value = 0.4;
      gain.connect(reverbSend);
      reverbSend.connect(reverbNode);
    }

    osc.start(t);
    osc.stop(t + dur + 0.05);

    // Flash audio indicator
    const ind = document.getElementById('audio-indicator');
    ind.classList.add('active');
    setTimeout(() => ind.classList.remove('active'), 120);

  } catch(e) {
    console.warn('playNote error:', e);
  }
}

function playChord(freqs, wave, vol, dur) {
  freqs.forEach((f, i) => setTimeout(() => playNote(f, wave, vol, dur), i * 75));
}

// ── STATE ─────────────────────────────────────────
let activeColor  = 'fire';
let drawMode     = 'echo';
let brushSize    = 18;
let isDrawing    = false;
let lastX = 0, lastY = 0;
let strokeCount  = 0;
let lastNoteTime = 0;
let echoTrails   = [];
let particles    = [];

const MODES = ['echo','smear','spray','ripple'];
let modeIdx = 0;

// ── DRAW MODES ────────────────────────────────────

function drawEcho(x, y, pressure=1) {
  const scale = SCALES[activeColor];
  if (!scale.length) return;

  const t = x / W;
  const scaleIdx = Math.floor(t * scale.length) % scale.length;
  const freq = scale[scaleIdx] * (1 + (y / H) * 0.5);
  const colorFn = COLOR_PALETTES[activeColor];
  const r = brushSize * pressure;

  // Void = eraser mode — cuts back to black background
  if (activeColor === 'void') {
    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc(x, y, r * 2.5, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,1)';
    ctx.fill();
    ctx.restore();
    // Also paint subtle white shimmer on top
    ctx.save();
    ctx.globalAlpha = 0.12;
    ctx.beginPath();
    ctx.arc(x, y, r * 0.5, 0, Math.PI*2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    ctx.restore();
  } else {
    const grad = ctx.createRadialGradient(x,y,0,x,y,r*2.2);
    grad.addColorStop(0,   colorFn(1.0) + '0.95)');
    grad.addColorStop(0.4, colorFn(0.8) + '0.5)');
    grad.addColorStop(1,   colorFn(0.3) + '0)');
    ctx.beginPath();
    ctx.arc(x,y,r*2.2,0,Math.PI*2);
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(x,y,r*0.5,0,Math.PI*2);
    ctx.fillStyle = colorFn(1.0)+'1)';
    ctx.fill();
  }

  echoTrails.push({ x,y,r,color:colorFn,age:0,maxAge:45,isVoid:activeColor==='void' });

  const now = Date.now();
  if (now - lastNoteTime > 50) {
    playNote(freq, WAVEFORMS[activeColor], activeColor==='void'?0.45:0.35, activeColor==='void'?0.9:0.5);
    lastNoteTime = now;
    document.getElementById('note-display').textContent = freqToNoteName(freq);
  }
}

function drawSmear(x, y, px, py) {
  const scale = SCALES[activeColor];
  if (!scale.length) return;
  const t = x / W;
  const freq = scale[Math.floor(t * scale.length) % scale.length];
  const colorFn = COLOR_PALETTES[activeColor];

  if (activeColor === 'void') {
    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(x, y);
    ctx.strokeStyle = 'rgba(0,0,0,1)';
    ctx.lineWidth = brushSize * 2.5;
    ctx.lineCap = 'round';
    ctx.stroke();
    ctx.restore();
  } else {
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(x, y);
    ctx.strokeStyle = colorFn(0.8) + '0.9)';
    ctx.lineWidth = brushSize * 1.8;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(x, y);
    ctx.strokeStyle = colorFn(1.0) + '0.3)';
    ctx.lineWidth = brushSize * 3.8;
    ctx.stroke();
  }

  const now = Date.now();
  if (now - lastNoteTime > 35) {
    playNote(freq, WAVEFORMS[activeColor], activeColor==='void'?0.40:0.30, activeColor==='void'?0.8:0.35);
    lastNoteTime = now;
    document.getElementById('note-display').textContent = freqToNoteName(freq);
  }
}

function drawSpray(x, y) {
  const scale = SCALES[activeColor];
  if (!scale.length) return;
  const colorFn = COLOR_PALETTES[activeColor];
  const count = Math.floor(brushSize * 1.4);
  const spread = brushSize * 3;

  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist  = Math.random() * spread;
    const dx = x + Math.cos(angle) * dist;
    const dy = y + Math.sin(angle) * dist;
    const sz = Math.random() * 2.5 + 0.5;
    const t  = Math.random();
    ctx.beginPath();
    ctx.arc(dx, dy, sz, 0, Math.PI*2);
    ctx.fillStyle = colorFn(t) + (0.4 + t*0.6) + ')';
    ctx.fill();
  }

  const freq = scale[Math.floor(Math.random() * scale.length)];
  const now = Date.now();
  if (now - lastNoteTime > 70) {
    playNote(freq * (0.9 + Math.random()*0.3), WAVEFORMS[activeColor], 0.28, 0.65);
    lastNoteTime = now;
    document.getElementById('note-display').textContent = freqToNoteName(freq);
  }
}

function drawRipple(x, y) {
  const scale = SCALES[activeColor];
  if (!scale.length) return;
  const t = x / W;
  const freq = scale[Math.floor(t * scale.length) % scale.length];
  const colorFn = COLOR_PALETTES[activeColor];

  particles.push({ x, y, r:4, maxR: brushSize*7, color:colorFn, age:0, maxAge:65 });

  const now = Date.now();
  if (now - lastNoteTime > 90) {
    playNote(freq, 'sine', 0.40, 0.9);
    lastNoteTime = now;
    document.getElementById('note-display').textContent = freqToNoteName(freq);
  }
}

// ── ANIMATION LOOP ────────────────────────────────
function tick() {
  ctx.fillStyle = 'rgba(12,12,15,0.014)';
  ctx.fillRect(0,0,W,H);

  echoTrails = echoTrails.filter(e => {
    e.age++;
    const progress = e.age / e.maxAge;
    const r = e.r * 2.2 + progress * e.r * 9;
    const alpha = (1 - progress) * 0.28;
    ctx.beginPath();
    ctx.arc(e.x, e.y, r, 0, Math.PI*2);
    ctx.strokeStyle = e.color(1-progress) + alpha + ')';
    ctx.lineWidth = 1.2;
    ctx.stroke();
    return e.age < e.maxAge;
  });

  particles = particles.filter(p => {
    p.age++;
    const progress = p.age / p.maxAge;
    const r = p.r + (p.maxR - p.r) * Math.pow(progress, 0.45);
    const alpha = (1 - progress) * 0.55;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI*2);
    ctx.strokeStyle = p.color(1-progress) + alpha + ')';
    ctx.lineWidth = 2 * (1-progress);
    ctx.stroke();
    if (r > 20) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, r*0.55, 0, Math.PI*2);
      ctx.strokeStyle = p.color(0.9) + (alpha*0.45) + ')';
      ctx.lineWidth = 0.6;
      ctx.stroke();
    }
    return p.age < p.maxAge;
  });

  requestAnimationFrame(tick);
}
tick();

// ── INPUT ─────────────────────────────────────────
function getPos(e) {
  if (e.touches && e.touches.length > 0) {
    return { x: e.touches[0].clientX, y: e.touches[0].clientY, pressure: e.touches[0].force || 0.6 };
  }
  return { x: e.clientX, y: e.clientY, pressure: 0.6 };
}

function onStart(e) {
  e.preventDefault();
  initAudio(); // initialize on first interaction
  isDrawing = true;
  const {x,y} = getPos(e);
  lastX = x; lastY = y;
  strokeCount++;
  document.getElementById('stroke-count').textContent = strokeCount + ' STROKES';

  if (drawMode === 'echo')   drawEcho(x, y);
  else if (drawMode === 'ripple') drawRipple(x, y);
  else if (drawMode === 'spray')  drawSpray(x, y);
}

function onMove(e) {
  e.preventDefault();
  if (!isDrawing) return;
  const {x,y,pressure} = getPos(e);

  if      (drawMode === 'echo')   drawEcho(x, y, pressure);
  else if (drawMode === 'smear')  drawSmear(x, y, lastX, lastY);
  else if (drawMode === 'spray')  drawSpray(x, y);
  else if (drawMode === 'ripple') drawRipple(x, y);

  lastX = x; lastY = y;
}

function onEnd(e) {
  e.preventDefault();
  isDrawing = false;
  document.getElementById('note-display').textContent = '—';
}

canvas.addEventListener('mousedown',  onStart, {passive:false});
canvas.addEventListener('mousemove',  onMove,  {passive:false});
canvas.addEventListener('mouseup',    onEnd,   {passive:false});
canvas.addEventListener('mouseleave', onEnd,   {passive:false});
canvas.addEventListener('touchstart', onStart, {passive:false});
canvas.addEventListener('touchmove',  onMove,  {passive:false});
canvas.addEventListener('touchend',   onEnd,   {passive:false});

// ── SIZE SLIDER ───────────────────────────────────
document.getElementById('size-slider').addEventListener('input', function() {
  brushSize = parseInt(this.value);
});

// ── BRUSH SWATCHES ────────────────────────────────
document.querySelectorAll('.swatch').forEach(s => {
  s.addEventListener('click', () => {
    document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
    s.classList.add('active');
    activeColor = s.dataset.color;
    initAudio();
    const scale = SCALES[activeColor];
    if (scale.length > 2) {
      playChord([scale[0], scale[2], scale[4]], WAVEFORMS[activeColor], 0.30, 0.5);
    }
  });
});

// ── MODE TOGGLE ───────────────────────────────────
function toggleMode() {
  modeIdx = (modeIdx + 1) % MODES.length;
  drawMode = MODES[modeIdx];
  document.getElementById('mode-txt').textContent = drawMode.toUpperCase();
  document.getElementById('active-mode').textContent = drawMode.toUpperCase();
  initAudio();
  playNote(523, 'sine', 0.25, 0.25);
}

// ── CLEAR ─────────────────────────────────────────
function clearCanvas() {
  ctx.fillStyle = '#0c0c0f';
  ctx.fillRect(0,0,W,H);
  echoTrails = [];
  particles  = [];
  strokeCount = 0;
  document.getElementById('stroke-count').textContent = '0 STROKES';
  document.getElementById('note-display').textContent = '—';
  initAudio();
  [880,660,440,220].forEach((f,i) => setTimeout(() => playNote(f,'sine',0.20,0.3),i*80));
}

// ── SAVE ──────────────────────────────────────────
function saveCanvas() {
  const link = document.createElement('a');
  link.download = 'sonica-' + Date.now() + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  const fl = document.getElementById('save-flash');
  fl.classList.add('show');
  setTimeout(() => fl.classList.remove('show'), 1800);
}

// ── INTRO DISMISS ─────────────────────────────────
function dismissIntro() {
  document.getElementById('intro').classList.add('gone');
  initAudio();
  setTimeout(() => {
    const scale = SCALES['fire'];
    scale.slice(0,6).forEach((f,i) => setTimeout(() => playNote(f,'sine',0.30,0.55), i*100));
  }, 200);
}

// ── KEYBOARD SHORTCUTS ────────────────────────────
window.addEventListener('keydown', e => {
  if (e.key === 'c' || e.key === 'C') clearCanvas();
  if (e.key === 's' || e.key === 'S') saveCanvas();
  if (e.key === 'm' || e.key === 'M') toggleMode();
  if (e.key >= '1' && e.key <= '6') {
    const colors = ['fire','ice','neon','plasma','gold','void'];
    const idx = parseInt(e.key)-1;
    document.querySelectorAll('.swatch')[idx]?.click();
  }
});
</script>
